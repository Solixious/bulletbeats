<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: shell(~{::title}, ~{::main})}">
<head>
  <title th:text="${mode == 'edit'} ? 'Edit Category — Bullet Beats Café' : 'New Category — Bullet Beats Café'">
    Category — Bullet Beats Café
  </title>
</head>
<body>
<main class="p-6 max-w-2xl mx-auto">

  <a href="/admin/categories"
     class="inline-flex items-center gap-1.5 text-sand text-sm hover:text-ivory transition-colors mb-6">
    ← Back to Categories
  </a>

  <div class="mb-7">
    <h1 class="font-heading text-3xl text-ivory tracking-wide"
        th:text="${mode == 'edit'} ? 'Edit Category' : 'New Category'">Category</h1>
    <p class="text-sand text-sm mt-0.5"
       th:text="${mode == 'edit'} ? 'Update category details' : 'Add a new menu category'"></p>
  </div>

  <div class="bg-surface rounded-xl border border-elevated/60 p-6">
    <form th:action="${mode == 'edit'}
                    ? @{/admin/categories/{id}/edit(id=${category.id})}
                    : @{/admin/categories/new}"
          th:object="${dto}"
          method="post"
          class="space-y-5">

      <!-- Name -->
      <div>
        <label for="name" class="block text-sand text-xs uppercase tracking-[0.2em] mb-1.5">Name</label>
        <input id="name" type="text" th:field="*{name}" required
               class="w-full bg-elevated rounded-lg px-4 py-2.5 text-ivory text-sm
                      placeholder-sand/40 outline-none transition-all duration-200"
               th:classappend="*{#fields.hasErrors('name')}
                               ? 'border border-red-500/70'
                               : 'border border-elevated focus:border-accent focus:shadow-neon-sm'"
               placeholder="e.g. Hot Beverages"/>
        <p th:if="*{#fields.hasErrors('name')}" th:errors="*{name}"
           class="mt-1.5 text-red-400 text-xs"></p>
      </div>

      <!-- Description -->
      <div>
        <label for="description" class="block text-sand text-xs uppercase tracking-[0.2em] mb-1.5">
          Description <span class="text-sand/40 normal-case">(optional)</span>
        </label>
        <textarea id="description" th:field="*{description}" rows="3"
                  class="w-full bg-elevated border border-elevated focus:border-accent
                         rounded-lg px-4 py-2.5 text-ivory text-sm placeholder-sand/40
                         outline-none transition-all duration-200 focus:shadow-neon-sm resize-none"
                  placeholder="Brief description for staff reference"></textarea>
      </div>

      <!-- Display Order -->
      <div>
        <label for="displayOrder" class="block text-sand text-xs uppercase tracking-[0.2em] mb-1.5">
          Display Order
        </label>
        <input id="displayOrder" type="number" th:field="*{displayOrder}" min="0"
               class="w-full bg-elevated border border-elevated focus:border-accent
                      rounded-lg px-4 py-2.5 text-ivory text-sm
                      placeholder-sand/40 outline-none transition-all duration-200 focus:shadow-neon-sm"
               placeholder="0"/>
        <p class="mt-1 text-sand/50 text-xs">Lower numbers appear first. Drag-to-reorder on the list overrides this.</p>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3 pt-2">
        <button type="submit"
                class="px-6 py-2.5 rounded-lg bg-accent text-base font-heading tracking-widest
                       text-sm hover:shadow-neon hover:brightness-110 transition-all duration-200"
                th:text="${mode == 'edit'} ? 'UPDATE CATEGORY' : 'CREATE CATEGORY'">
          Submit
        </button>
        <a href="/admin/categories"
           class="px-4 py-2.5 text-sand text-sm hover:text-ivory transition-colors">
          Cancel
        </a>
      </div>

    </form>
  </div>

</main>
</body>
</html>
