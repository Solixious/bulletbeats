<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<form th:fragment="recipe-notes-edit-form"
      th:attr="hx-patch=@{/admin/dishes/{id}/recipe-notes(id=${dish.id})}"
      hx-target="#recipe-notes-section"
      hx-swap="innerHTML">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

  <textarea name="recipeNotes" rows="8"
            placeholder="e.g. 1. Boil milk and water together.
2. Add tea leaves once it starts boiling.
3. Let it simmer for 2 minutes before adding sugar..."
            class="w-full bg-elevated rounded-lg px-3 py-2.5
                   text-ivory text-sm border border-elevated/60
                   focus:border-accent outline-none
                   transition-colors placeholder-sand/30
                   resize-y"
            th:text="${dish.recipeNotes}"></textarea>

  <div class="flex gap-2 mt-3">
    <button type="submit"
            class="px-4 py-2 rounded-lg bg-accent text-base
                   text-sm font-medium hover:shadow-neon-sm
                   transition-all">
      Save Notes
    </button>
    <button type="button"
            th:attr="hx-get=@{/admin/dishes/{id}/recipe-notes(id=${dish.id})}"
            hx-target="#recipe-notes-section"
            hx-swap="innerHTML"
            class="px-4 py-2 rounded-lg border border-elevated/60
                   text-sand text-sm hover:text-ivory
                   transition-colors">
      Cancel
    </button>
  </div>
</form>
</body>
</html>
