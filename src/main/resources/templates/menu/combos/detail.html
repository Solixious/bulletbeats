<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: shell(~{::title}, ~{::main})}">
<head>
  <title th:text="${combo.name} + ' — Combos'">Combo Detail — Bullet Beats Café</title>
</head>
<body>
<main class="p-6 max-w-5xl mx-auto">

  <a href="/admin/combos"
     class="inline-flex items-center gap-1.5 text-sand text-sm hover:text-ivory transition-colors mb-5">
    ← Back to Combos
  </a>

  <div th:if="${param.updated}"
       class="mb-5 px-4 py-3 rounded-lg bg-elevated border border-accent/30 text-accent text-sm">
    Combo updated successfully.
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

    <!-- Left: Combo info -->
    <div class="lg:col-span-2 bg-surface rounded-xl border border-elevated/60 p-6">
      <div class="flex items-start justify-between mb-5">
        <div>
          <h1 class="font-heading text-3xl text-ivory tracking-wide" th:text="${combo.name}">Name</h1>
          <p class="text-sand text-sm mt-0.5" th:text="${combo.description} ?: ''"></p>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          <a th:href="@{/admin/combos/{id}/edit(id=${combo.id})}"
             class="text-xs px-3 py-1.5 rounded border border-sand/30 text-sand
                    hover:border-ivory/40 hover:text-ivory transition-colors">Edit</a>
          <form th:action="@{/admin/combos/{id}/deactivate(id=${combo.id})}"
                method="post" class="inline"
                onsubmit="return bbConfirm(this, 'Deactivate this combo?')">
            <button type="submit"
                    class="text-xs px-3 py-1.5 rounded border border-red-500/30 text-red-400
                           hover:border-red-500/60 hover:bg-red-500/10 transition-colors">
              Deactivate
            </button>
          </form>
        </div>
      </div>

      <div class="mb-5 pb-4 border-b border-elevated/40">
        <p class="text-sand text-xs uppercase tracking-widest mb-0.5">Status</p>
        <span th:if="${combo.active}"
              class="px-2 py-0.5 text-xs border rounded-full font-bold uppercase
                     text-emerald-400 border-emerald-400/40 bg-emerald-400/10">Active</span>
        <span th:unless="${combo.active}"
              class="px-2 py-0.5 text-xs border rounded-full font-bold uppercase
                     text-sand border-sand/40 bg-sand/10">Inactive</span>
      </div>

      <!-- Ingredients table -->
      <h2 class="font-heading text-lg text-ivory tracking-wide mb-3">Ingredients</h2>
      <div class="rounded-lg overflow-hidden border border-elevated/60">
        <table class="w-full text-left text-sm">
          <thead>
            <tr class="border-b border-elevated/60 text-sand text-xs uppercase tracking-widest">
              <th class="px-4 py-2.5 font-medium">Item</th>
              <th class="px-4 py-2.5 font-medium">Required</th>
              <th class="px-4 py-2.5 font-medium">In Stock</th>
              <th class="px-4 py-2.5 font-medium">Status</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(combo.ingredients)}">
              <td colspan="4" class="px-4 py-4 text-sand text-center">No ingredients defined.</td>
            </tr>
            <tr th:each="ing : ${combo.ingredients}"
                th:with="sufficient=${ing.groceryItem.quantityInStock.compareTo(ing.quantityRequired) >= 0}"
                class="border-b border-elevated/30 last:border-0">
              <td class="px-4 py-2.5 text-ivory" th:text="${ing.groceryItem.name}"></td>
              <td class="px-4 py-2.5 font-mono text-sand"
                  th:text="${#numbers.formatDecimal(ing.quantityRequired,1,3)} + ' ' + ${ing.groceryItem.unit}"></td>
              <td class="px-4 py-2.5 font-mono"
                  th:classappend="${sufficient} ? 'text-emerald-400' : 'text-red-400'"
                  th:text="${#numbers.formatDecimal(ing.groceryItem.quantityInStock,1,3)} + ' ' + ${ing.groceryItem.unit}"></td>
              <td class="px-4 py-2.5">
                <span th:if="${sufficient}"
                      class="px-2 py-0.5 text-xs border rounded-full uppercase font-bold
                             text-emerald-400 border-emerald-400/40 bg-emerald-400/10">OK</span>
                <span th:unless="${sufficient}"
                      class="px-2 py-0.5 text-xs border rounded-full uppercase font-bold
                             text-red-400 border-red-400/40 bg-red-400/10">Low</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Right -->
    <div class="bg-surface rounded-xl border border-elevated/60 p-6 h-fit">
      <h2 class="font-heading text-lg text-ivory tracking-wide mb-1">Menu Items</h2>
      <p class="text-sand text-xs mb-4">Items using this combo</p>
      <p class="text-sand text-sm">
        View in
        <a href="/admin/menu" class="text-accent hover:underline">Menu Management</a>
        to see which menu items use this combo.
      </p>
    </div>

  </div>

</main>
</body>
</html>
