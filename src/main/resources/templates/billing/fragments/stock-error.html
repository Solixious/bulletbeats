<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="stock-error" id="bill-status" class="space-y-3 pt-4 border-t border-elevated/60">

  <div class="px-4 py-3 rounded-lg border border-red-500/40 bg-red-500/10">
    <p class="text-red-400 text-sm font-medium mb-2">Cannot confirm — insufficient stock:</p>
    <ul class="space-y-1">
      <li th:each="detail : ${stockDetails}"
          class="text-red-400/80 text-xs font-mono"
          th:text="${detail}"></li>
    </ul>
  </div>

  <button th:attr="hx-post='/bills/' + ${billId} + '/confirm'"
          hx-target="#bill-status"
          hx-swap="outerHTML"
          class="w-full py-2.5 rounded-lg border border-accent/40 text-accent
                 font-heading tracking-widest text-sm hover:bg-accent/10 transition-colors">
    RETRY CONFIRM
  </button>

</div>
</body>
</html>
