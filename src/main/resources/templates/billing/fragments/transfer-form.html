<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<div th:fragment="transfer-form" id="transfer-panel-inner"
     class="mt-4 bg-elevated/40 rounded-xl border border-elevated/60 p-4">

  <h3 class="font-heading text-base text-ivory tracking-wide mb-3">Transfer Table</h3>

  <div th:if="${#lists.isEmpty(freeTables)}"
       class="text-sand text-sm py-3">
    No free tables available for transfer.
    <button hx-get="#"
            hx-target="#transfer-panel"
            hx-swap="innerHTML"
            onclick="document.getElementById('transfer-panel').innerHTML=''"
            class="ml-2 text-xs text-sand/60 hover:text-ivory underline">
      Cancel
    </button>
  </div>

  <form th:unless="${#lists.isEmpty(freeTables)}"
        th:attr="hx-post=@{/bills/{id}/transfer(id=${bill.id})}"
        hx-target="#transfer-panel"
        hx-swap="innerHTML">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="mb-3">
      <label class="block text-sand text-xs mb-1.5 uppercase tracking-widest">Move to table</label>
      <select name="toTableId" required
              class="w-full bg-base rounded-lg px-3 py-2 text-ivory text-sm
                     border border-elevated/60 focus:border-accent outline-none transition-colors">
        <option value="">Select a table…</option>
        <option th:each="t : ${freeTables}"
                th:value="${t.id}"
                th:text="${t.name}"></option>
      </select>
    </div>

    <div class="flex gap-2">
      <button type="submit"
              class="flex-1 py-2 rounded-lg bg-accent text-base text-sm font-heading
                     tracking-wider hover:brightness-110 transition-all">
        Confirm Transfer
      </button>
      <button type="button"
              onclick="document.getElementById('transfer-panel').innerHTML=''"
              class="px-4 py-2 rounded-lg border border-sand/30 text-sand text-sm
                     hover:border-ivory/40 hover:text-ivory transition-colors">
        Cancel
      </button>
    </div>
  </form>

</div>

</body>
</html>
