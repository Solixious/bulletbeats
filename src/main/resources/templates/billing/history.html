<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: shell(~{::title}, ~{::main})}">
<head>
  <title>Bill History — Bullet Beats Café</title>
</head>
<body>
<main class="p-6 max-w-6xl mx-auto">

  <!-- Header -->
  <div class="flex flex-wrap items-start justify-between gap-y-3 mb-6">
    <div>
      <h1 class="font-heading text-3xl text-ivory tracking-wide">Bill History</h1>
      <p class="text-sand text-sm mt-0.5">All bills — search by date or customer</p>
    </div>
    <a href="/bills"
       class="text-xs px-3 py-1.5 border border-sand/30 text-sand rounded
              hover:border-ivory/40 hover:text-ivory transition-colors">
      ← Billing
    </a>
  </div>

  <!-- Filters -->
  <form method="get" action="/bills/history"
        class="bg-surface rounded-xl border border-elevated/60 p-4 mb-6">
    <div class="flex flex-wrap items-end gap-4">

      <div class="flex flex-col gap-1.5">
        <label class="text-sand text-xs uppercase tracking-[0.15em]">From</label>
        <input type="date" name="from"
               th:value="${from}"
               class="bg-elevated border border-elevated/60 focus:border-accent rounded-lg
                      px-3 py-2 text-ivory text-sm outline-none transition-colors
                      focus:shadow-neon-sm"/>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sand text-xs uppercase tracking-[0.15em]">To</label>
        <input type="date" name="to"
               th:value="${to}"
               class="bg-elevated border border-elevated/60 focus:border-accent rounded-lg
                      px-3 py-2 text-ivory text-sm outline-none transition-colors
                      focus:shadow-neon-sm"/>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sand text-xs uppercase tracking-[0.15em]">Customer Phone</label>
        <input type="tel" name="phone" placeholder="e.g. 9876543210"
               th:value="${phone}"
               class="bg-elevated border border-elevated/60 focus:border-accent rounded-lg
                      px-3 py-2 text-ivory text-sm outline-none transition-colors
                      focus:shadow-neon-sm w-48"/>
      </div>

      <div class="flex items-end gap-2 pb-0.5">
        <button type="submit"
                class="px-4 py-2 rounded-lg bg-accent text-base font-heading tracking-widest
                       text-xs hover:shadow-neon hover:brightness-110 transition-all duration-200">
          FILTER
        </button>
        <a href="/bills/history"
           class="px-4 py-2 text-sand text-xs hover:text-ivory transition-colors">
          Clear
        </a>
      </div>

    </div>
  </form>

  <!-- Results -->
  <div class="bg-surface rounded-xl overflow-hidden border border-elevated/60">

    <div class="px-4 py-3 border-b border-elevated/60 flex items-center justify-between">
      <h2 class="font-heading text-lg text-ivory tracking-wide">Results</h2>
      <span class="text-sand text-xs"
            th:text="${bills.totalElements} + ' bill' + (${bills.totalElements} != 1 ? 's' : '')">
      </span>
    </div>

    <!-- Empty state -->
    <div th:if="${bills.isEmpty()}"
         class="py-16 text-center text-sand text-sm">
      No bills match the selected filters.
    </div>

    <!-- Table -->
    <table th:unless="${bills.isEmpty()}" class="w-full text-left">
      <thead>
        <tr class="border-b border-elevated/60 text-sand text-xs uppercase tracking-widest">
          <th class="px-4 py-3 font-medium">Bill #</th>
          <th class="px-4 py-3 font-medium">Date &amp; Time</th>
          <th class="px-4 py-3 font-medium">Table</th>
          <th class="px-4 py-3 font-medium">Customer</th>
          <th class="px-4 py-3 font-medium">Status</th>
          <th class="px-4 py-3 font-medium">Total</th>
          <th class="px-4 py-3 font-medium"></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="b : ${bills.content}"
            class="border-b border-elevated/40 last:border-0 hover:bg-elevated/20 transition-colors">

          <td class="px-4 py-3 font-mono text-accent text-sm" th:text="${b.billNumber}"></td>

          <td class="px-4 py-3 text-sand text-xs whitespace-nowrap"
              th:text="${#temporals.format(b.createdAt, 'dd MMM yyyy, HH:mm')}"></td>

          <td class="px-4 py-3 text-ivory text-sm" th:text="${b.cafeTable.name}"></td>

          <td class="px-4 py-3 text-sand text-sm">
            <span th:if="${b.customer != null}">
              <span th:text="${b.customer.name}" class="text-ivory"></span>
              <span class="block text-xs font-mono" th:text="${b.customer.maskedPhone}"></span>
            </span>
            <span th:unless="${b.customer != null}" class="text-sand/60">Walk-in</span>
          </td>

          <td class="px-4 py-3">
            <span class="px-2 py-0.5 text-xs border rounded-full font-bold"
                  th:with="s=${b.status.name()}"
                  th:classappend="${s == 'PAID'}      ? 'text-emerald-400 border-emerald-400/40 bg-emerald-400/10' :
                                 (${s == 'CONFIRMED'} ? 'text-amber-400 border-amber-400/40 bg-amber-400/10' :
                                 (${s == 'CANCELLED'} ? 'text-red-400 border-red-400/40 bg-red-400/10' :
                                                        'text-sand border-sand/40 bg-sand/10'))"
                  th:text="${b.status.displayName}">
            </span>
          </td>

          <td class="px-4 py-3 text-ivory text-sm font-medium"
              th:text="'₹' + ${#numbers.formatDecimal(b.totalAmount, 1, 2)}"></td>

          <td class="px-4 py-3">
            <a th:href="@{/bills/{id}(id=${b.id})}"
               class="text-xs text-accent hover:underline whitespace-nowrap">View →</a>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Pagination -->
    <div th:unless="${bills.isEmpty()}"
         class="flex items-center justify-between px-4 py-3 border-t border-elevated/60">

      <p class="text-sand text-xs"
         th:text="'Page ' + (${bills.number} + 1) + ' of ' + ${bills.totalPages} +
                  ' · ' + ${bills.totalElements} + ' total'">
      </p>

      <div class="flex gap-2">
        <th:block th:if="${bills.hasPrevious()}">
          <a th:href="@{/bills/history(page=${bills.number - 1}, from=${from}, to=${to}, phone=${phone})}"
             class="px-3 py-1 text-xs border border-sand/30 text-sand rounded
                    hover:border-ivory/40 hover:text-ivory transition-colors">
            ← Prev
          </a>
        </th:block>
        <th:block th:if="${bills.hasNext()}">
          <a th:href="@{/bills/history(page=${bills.number + 1}, from=${from}, to=${to}, phone=${phone})}"
             class="px-3 py-1 text-xs border border-sand/30 text-sand rounded
                    hover:border-ivory/40 hover:text-ivory transition-colors">
            Next →
          </a>
        </th:block>
      </div>

    </div>
  </div>

</main>
</body>
</html>
