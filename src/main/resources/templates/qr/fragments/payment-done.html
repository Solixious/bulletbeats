<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<th:block th:fragment="payment-done">
  <!-- No polling div — once shown, this stays. Payment is final. -->

  <div class="bg-surface border-t-2 border-emerald-500/60 rounded-t-2xl shadow-2xl px-5 pt-7 pb-8">

    <!-- Success icon -->
    <div class="flex justify-center mb-4">
      <div class="w-16 h-16 rounded-full bg-emerald-500/20 border-2 border-emerald-500/50
                  flex items-center justify-center">
        <span class="text-3xl">✓</span>
      </div>
    </div>

    <!-- Heading -->
    <div class="text-center mb-5">
      <p class="font-heading text-3xl text-emerald-400 tracking-wide">Payment Done!</p>
      <p class="text-sand text-sm mt-1">Thank you, <span th:text="${customerName}">Guest</span>. See you again!</p>
    </div>

    <!-- Bill summary pill -->
    <div class="rounded-xl border border-elevated/60 bg-elevated/30 px-4 py-3
                flex items-center justify-between mb-5">
      <div>
        <p class="text-sand text-xs">Bill</p>
        <p class="text-ivory text-sm font-mono" th:text="${bill.billNumber}">BB-0001</p>
      </div>
      <div class="text-right">
        <p class="text-sand text-xs">Paid</p>
        <p class="font-heading text-xl text-emerald-400"
           th:text="'₹' + ${bill.totalAmount}">₹0</p>
      </div>
    </div>

    <!-- Prompt to close -->
    <p class="text-center text-sand/50 text-xs">You may close this page</p>

  </div>
</th:block>

</body>
</html>
