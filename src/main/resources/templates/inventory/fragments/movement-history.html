<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="movement-history" id="movement-history">

  <!-- Empty state -->
  <div th:if="${movements.isEmpty()}"
       class="py-8 text-center text-sand text-sm">
    No movements recorded yet.
  </div>

  <table th:unless="${movements.isEmpty()}" class="w-full text-left text-sm">
    <thead>
      <tr class="border-b border-elevated/60 text-sand text-xs uppercase tracking-widest">
        <th class="px-3 py-2 font-medium">Date</th>
        <th class="px-3 py-2 font-medium">Type</th>
        <th class="px-3 py-2 font-medium">Change</th>
        <th class="px-3 py-2 font-medium">Before → After</th>
        <th class="px-3 py-2 font-medium">Notes</th>
        <th class="px-3 py-2 font-medium">By</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="m : ${movements.content}"
          class="border-b border-elevated/30 hover:bg-elevated/20 transition-colors">

        <td class="px-3 py-2.5 text-sand font-mono text-xs whitespace-nowrap"
            th:text="${#temporals.format(m.createdAt, 'dd MMM, HH:mm')}"></td>

        <td class="px-3 py-2.5">
          <span class="px-2 py-0.5 text-xs border rounded-full font-bold uppercase"
                th:with="t=${m.movementType.name()}"
                th:classappend="${t == 'INBOUND'}    ? 'text-emerald-400 border-emerald-400/40 bg-emerald-400/10' :
                               (${t == 'OUTBOUND'}   ? 'text-red-400 border-red-400/40 bg-red-400/10' :
                               (${t == 'WASTAGE'}    ? 'text-amber-400 border-amber-400/40 bg-amber-400/10' :
                                                       'text-accent border-accent/40 bg-accent/10'))"
                th:text="${m.movementType.displayName}">
          </span>
        </td>

        <td class="px-3 py-2.5 font-mono">
          <span th:with="isIn=${m.movementType.name() == 'INBOUND' or m.movementType.name() == 'ADJUSTMENT'}"
                th:classappend="${isIn} ? 'text-emerald-400' : 'text-red-400'"
                th:text="${isIn} ? '+' + ${#numbers.formatDecimal(m.quantity, 1, 3)} : '-' + ${#numbers.formatDecimal(m.quantity, 1, 3)}">
          </span>
        </td>

        <td class="px-3 py-2.5 text-sand text-xs font-mono"
            th:text="${#numbers.formatDecimal(m.stockBefore,1,3)} + ' → ' + ${#numbers.formatDecimal(m.stockAfter,1,3)}">
        </td>

        <td class="px-3 py-2.5 text-sand text-xs" th:text="${m.notes} ?: '—'"></td>
        <td class="px-3 py-2.5 text-sand/60 text-xs font-mono"
            th:text="${m.createdBy != null ? (usernameMap.get(m.createdBy) ?: m.createdBy) : '—'}"></td>

      </tr>
    </tbody>
  </table>

  <!-- Pagination -->
  <div th:unless="${movements.isEmpty()}"
       class="flex items-center justify-between mt-3 pt-3 border-t border-elevated/40">
    <p class="text-sand text-xs"
       th:text="'Page ' + (${movements.number} + 1) + ' of ' + ${movements.totalPages}"></p>
    <div class="flex gap-2">
      <button th:if="${movements.hasPrevious()}"
              th:attr="hx-get='/inventory/' + ${itemId} + '/movements?page=' + (${movements.number} - 1)"
              hx-target="#movement-history"
              hx-swap="outerHTML"
              class="px-3 py-1 text-xs border border-sand/30 text-sand rounded
                     hover:border-ivory/40 hover:text-ivory transition-colors">
        ← Prev
      </button>
      <button th:if="${movements.hasNext()}"
              th:attr="hx-get='/inventory/' + ${itemId} + '/movements?page=' + (${movements.number} + 1)"
              hx-target="#movement-history"
              hx-swap="outerHTML"
              class="px-3 py-1 text-xs border border-sand/30 text-sand rounded
                     hover:border-ivory/40 hover:text-ivory transition-colors">
        Next →
      </button>
    </div>
  </div>

</div>

</body>
</html>
