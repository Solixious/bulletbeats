spring:
  application:
    name: bulletbeats

  # ── Datasource ───────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bulletbeats}
    username: ${SPRING_DATASOURCE_USERNAME:bulletbeats}
    password: ${SPRING_DATASOURCE_PASSWORD:bulletbeats}
    hikari:
      pool-name: BulletBeatsPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000   # 30s
      idle-timeout: 600000        # 10 min
      max-lifetime: 1800000       # 30 min
      connection-test-query: SELECT 1

  # ── JPA ──────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # ── Flyway ───────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # ── Thymeleaf ────────────────────────────────────────────
  thymeleaf:
    cache: true   # dev profile overrides to false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8

  # ── Session ──────────────────────────────────────────────
  session:
    store-type: jdbc
    timeout: 30m
    jdbc:
      initialize-schema: never  # Flyway manages schema

  # ── Servlet / Multipart ──────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

# ── Server ───────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /
    session:
      cookie:
        http-only: true
        secure: false   # set true when behind HTTPS reverse proxy
        same-site: strict
  error:
    whitelabel:
      enabled: false
    path: /error

# ── App custom config ────────────────────────────────────────
app:
  upload-dir: ${APP_UPLOAD_DIR:./uploads}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  max-image-size-mb: 2
  rate-limit:
    login-max-attempts: 5
    login-lockout-minutes: 15

# ── Logging (console only — Docker captures stdout) ──────────
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: WARN
    in.bulletbeats: ${LOGGING_LEVEL_IN_BULLETBEATS:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
